<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="SpeakLow favicon">
  <defs>
    <linearGradient id="fav-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C563"/>
      <stop offset="100%" stop-color="#F0A832"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#0D0F12"/>

  <!-- Mic body — simplified pill shape -->
  <rect x="12" y="4" width="8" height="13" rx="4" fill="url(#fav-grad)"/>

  <!-- Mic arc (stand) -->
  <path d="M8 14 Q8 22 16 22 Q24 22 24 14" fill="none" stroke="#F5C563" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Vertical stand -->
  <line x1="16" y1="22" x2="16" y2="26" stroke="#F5C563" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="11" y1="26" x2="21" y2="26" stroke="#F5C563" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Single left wave arc -->
  <path d="M9 12 Q6 16 9 20" fill="none" stroke="#4ECDC4" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Single right wave arc -->
  <path d="M23 12 Q26 16 23 20" fill="none" stroke="#4ECDC4" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
</svg>
